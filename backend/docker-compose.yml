services:
 mysql:
  image: mysql:8.4
  container_name: jogaplus
  environment:
   MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
   MYSQL_DATABASE: ${MYSQL_DATABASE}
   MYSQL_USER: ${MYSQL_USER}
   MYSQL_PASSWORD: ${MYSQL_PASSWORD}
  ports:
   - '3306:3306'
  volumes:
   - mysql_data:/var/lib/mysql

 adminer:
  image: adminer
  container_name: jogaplus-adminer
  ports:
   - '8080:8080'
  depends_on:
   - mysql

volumes:
 mysql_data:
